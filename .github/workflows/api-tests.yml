name: API Tests CI

on:
  push:
    branches:
      - main
  pull_request:
      branches:
        - main
  workflow_dispatch:
jobs:
  run-api-tests:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Checkout repository code
        uses: actions/checkout@v4

      - name: 2. Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 3. Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 4. Create reports folder
        run: mkdir -p reports

      - name: 5. Run Pytest suite and generate reports
        run: pytest tests/ -v --junitxml=reports/junit.xml --html=reports/report.html --self-contained-html

      - name: 6. Upload Test Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: qa-api-test-reports
          path: reports/